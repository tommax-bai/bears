<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bear's Home</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="public-body">
    <div id="entryGate" class="entry-gate" aria-hidden="false">
      <div class="entry-shell">
        <div class="entry-copy">
          <p class="eyebrow">Tap To Enter</p>
          <h1>Magic Key</h1>
        </div>
        <div id="entryGrid" class="entry-grid"></div>
        <button id="entryLogo" class="entry-logo" type="button" aria-label="进入 Bear's Home">
          <span class="entry-logo-mark" aria-hidden="true">
            <span class="bear-mark">
              <span class="bear-ear bear-ear-left"></span>
              <span class="bear-ear bear-ear-right"></span>
              <span class="bear-face">
                <span class="bear-eye bear-eye-left"></span>
                <span class="bear-eye bear-eye-right"></span>
                <span class="bear-snout"></span>
              </span>
            </span>
          </span>
          <span class="entry-logo-text">Bear's Home</span>
        </button>
      </div>
    </div>

    <main class="shell public-shell">
      <section class="panel">
        <div class="panel-head">
          <div>
            <p class="eyebrow">Live Feed</p>
            <h2>Bear's Home</h2>
          </div>
          <div class="settings-anchor">
            <button id="openSettings" class="settings-button" type="button" aria-label="打开昵称设置">设置</button>
            <div id="settingsPrompt" class="settings-prompt hidden" aria-hidden="true">
              <p>发布前请先填写昵称</p>
              <button id="promptFillNickname" type="button" class="text-button">去填写</button>
            </div>
          </div>
        </div>
        <div id="pullHint" class="pull-hint">下拉刷新</div>
        <div id="publicList" class="message-stream"></div>
      </section>

      <section class="summary-grid compact-summary" id="publicSummary"></section>
    </main>

    <div id="publishDock" class="publish-dock" aria-label="发布入口">
      <button
        id="publishToggle"
        class="publish-toggle"
        type="button"
        aria-label="点击发文字，长按发图片"
      >
        +
      </button>
    </div>

    <div id="composerSheet" class="sheet hidden" aria-hidden="true">
      <div id="sheetBackdrop" class="sheet-backdrop"></div>
      <div class="sheet-panel">
        <div class="sheet-head">
          <div>
            <p class="eyebrow">Publisher</p>
            <h2 id="composerTitle">发布新内容</h2>
          </div>
          <button id="closeComposer" class="icon-button" aria-label="关闭">×</button>
        </div>

        <form id="messageForm" class="composer-form">
          <input id="postType" name="postType" type="hidden" value="text" />

          <div id="postTypeSwitch" class="post-type-switch" role="tablist" aria-label="发布类型">
            <button type="button" class="post-type-option is-active" data-post-type="image" aria-pressed="true">图片帖</button>
            <button type="button" class="post-type-option" data-post-type="text" aria-pressed="false">文字帖</button>
          </div>

          <div id="postModeIntro" class="composer-intro">
            <strong>图片帖</strong>
            <span>适合一口气发 1 到 9 张图，可附一句简短说明。</span>
          </div>

          <label id="contentField">
            <span id="contentLabel">图片说明</span>
            <textarea
              id="messageContent"
              name="content"
              rows="5"
              maxlength="280"
              placeholder="给这组图片补一句说明也可以留空。"
            ></textarea>
          </label>

          <div id="imageField" class="media-field">
            <div class="media-field-head">
              <span>本地相册</span>
              <button id="chooseImages" type="button" class="text-button">重新选择</button>
            </div>
            <input id="imageUpload" name="images" type="file" accept="image/*" multiple />
            <div id="uploadNote" class="upload-note">最多上传 9 张图片。</div>
            <div id="imagePreview" class="image-preview"></div>
          </div>

          <div id="emojiSection" class="emoji-picker hidden" aria-label="可选表情">
            <span class="emoji-label">可选表情</span>
            <div id="emojiPicker" class="emoji-list">
              <button type="button" class="emoji-option" data-emoji="😀">😀</button>
              <button type="button" class="emoji-option" data-emoji="😂">😂</button>
              <button type="button" class="emoji-option" data-emoji="🥳">🥳</button>
              <button type="button" class="emoji-option" data-emoji="😍">😍</button>
              <button type="button" class="emoji-option" data-emoji="👍">👍</button>
              <button type="button" class="emoji-option" data-emoji="❤️">❤️</button>
              <button type="button" class="emoji-option" data-emoji="🔥">🔥</button>
              <button type="button" class="emoji-option" data-emoji="🎉">🎉</button>
            </div>
          </div>

          <label>
            可见模式
            <input id="burnAfter" name="burnAfter" type="hidden" value="after_read" />
            <div id="burnAfterSwitch" class="mode-switch" role="tablist" aria-label="可见模式">
              <button type="button" class="mode-option" data-value="never" aria-pressed="false">长期可见</button>
              <button type="button" class="mode-option is-active" data-value="after_read" aria-pressed="true">焚烧</button>
            </div>
          </label>

          <div class="rule-strip">
            <span id="rulePrimary">文字帖必须填写内容</span>
            <span>最多 280 字</span>
            <span id="ruleImages">图片帖最多 9 张</span>
          </div>

          <div id="submitFeedback" class="feedback neutral">请选择发布方式。图片帖适合发相册，文字帖只发布纯文字内容。</div>

          <div class="form-actions composer-actions">
            <button id="submitButton" type="submit" class="primary-button">发布</button>
            <button type="button" id="resetComposer" class="secondary-button">重置</button>
          </div>
        </form>
      </div>
    </div>

    <div id="settingsSheet" class="sheet hidden" aria-hidden="true">
      <div id="settingsBackdrop" class="sheet-backdrop"></div>
      <div class="sheet-panel settings-panel">
        <div class="sheet-head">
          <div>
            <p class="eyebrow">Profile</p>
            <h2>昵称设置</h2>
          </div>
          <button id="closeSettings" class="icon-button" aria-label="关闭设置">×</button>
        </div>

        <form id="settingsForm" class="composer-form">
          <label>
            昵称
            <input id="settingsNickname" name="settingsNickname" type="text" maxlength="24" placeholder="例如：周末访客" />
          </label>
          <div id="settingsFeedback" class="feedback neutral">设置后，发布内容会默认使用这个昵称。</div>
          <div class="form-actions">
            <button type="submit" class="primary-button">保存昵称</button>
          </div>
        </form>
      </div>
    </div>

    <script src="./app/message-board.js"></script>
    <script src="./app/public.js"></script>
  </body>
</html>
